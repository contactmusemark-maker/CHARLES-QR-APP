openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Charles Mood Check-In API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: checkins
    description: Mood check-in operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /checkins:
    get:
      operationId: listCheckins
      tags: [checkins]
      summary: List all check-ins (admin)
      parameters:
        - in: query
          name: date
          schema:
            type: string
          description: Filter by date (YYYY-MM-DD), defaults to today
      responses:
        "200":
          description: List of check-ins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CheckIn"
    post:
      operationId: createCheckin
      tags: [checkins]
      summary: Submit a mood check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInInput"
      responses:
        "201":
          description: Check-in created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckIn"

  /checkins/summary:
    get:
      operationId: getCheckinSummary
      tags: [checkins]
      summary: Get today's mood summary for admin dashboard
      parameters:
        - in: query
          name: date
          schema:
            type: string
          description: Date to summarize (YYYY-MM-DD), defaults to today
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInSummary"

  /checkins/employee/{employeeId}:
    get:
      operationId: getEmployeeHistory
      tags: [checkins]
      summary: Get full check-in history for a specific employee
      parameters:
        - in: path
          name: employeeId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Employee check-in history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeHistory"

  /checkins/trends:
    get:
      operationId: getCheckinTrends
      tags: [checkins]
      summary: Get mood trends for the past 7 days
      responses:
        "200":
          description: 7-day mood trends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendDay"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    CheckInInput:
      type: object
      required: [employeeId, employeeName, mood]
      properties:
        employeeId:
          type: string
        employeeName:
          type: string
        department:
          type: ["string", "null"]
        mood:
          type: string
          enum: [great, good, okay, calm, stressed, exhausted]
        energyLevel:
          type: ["integer", "null"]
          minimum: 1
          maximum: 10
        focusLevel:
          type: ["integer", "null"]
          minimum: 1
          maximum: 10
        stressLevel:
          type: ["integer", "null"]
          minimum: 1
          maximum: 10
        tags:
          type: array
          items:
            type: string
        note:
          type: ["string", "null"]

    CheckIn:
      type: object
      required: [id, employeeId, employeeName, mood, checkedInAt]
      properties:
        id:
          type: integer
        employeeId:
          type: string
        employeeName:
          type: string
        department:
          type: ["string", "null"]
        mood:
          type: string
          enum: [great, good, okay, calm, stressed, exhausted]
        energyLevel:
          type: ["integer", "null"]
        focusLevel:
          type: ["integer", "null"]
        stressLevel:
          type: ["integer", "null"]
        tags:
          type: array
          items:
            type: string
        note:
          type: ["string", "null"]
        checkedInAt:
          type: string
          format: date-time

    DepartmentStat:
      type: object
      required: [department, count, averageWellness, dominantMood]
      properties:
        department:
          type: string
        count:
          type: integer
        averageWellness:
          type: number
        dominantMood:
          type: string

    CheckInSummary:
      type: object
      required: [totalCheckins, moodBreakdown, averageEnergy, averageFocus, averageStress, teamWellnessScore, burnoutRiskCount, departmentBreakdown]
      properties:
        totalCheckins:
          type: integer
        moodBreakdown:
          type: object
          additionalProperties:
            type: integer
        averageEnergy:
          type: number
        averageFocus:
          type: number
        averageStress:
          type: number
        teamWellnessScore:
          type: number
        burnoutRiskCount:
          type: integer
        departmentBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/DepartmentStat"
        topPositiveEmployees:
          type: array
          items:
            $ref: "#/components/schemas/CheckIn"
        needsSupportEmployees:
          type: array
          items:
            $ref: "#/components/schemas/CheckIn"

    EmployeeHistory:
      type: object
      required: [employeeId, employeeName, checkins]
      properties:
        employeeId:
          type: string
        employeeName:
          type: string
        department:
          type: ["string", "null"]
        checkins:
          type: array
          items:
            $ref: "#/components/schemas/CheckIn"
        averageEnergy:
          type: number
        averageFocus:
          type: number
        averageStress:
          type: number
        averageWellness:
          type: number
        burnoutDays:
          type: integer
        dominantMood:
          type: string

    TrendDay:
      type: object
      required: [date, totalCheckins, dominantMood, averageWellness]
      properties:
        date:
          type: string
        totalCheckins:
          type: integer
        dominantMood:
          type: string
        averageWellness:
          type: number
