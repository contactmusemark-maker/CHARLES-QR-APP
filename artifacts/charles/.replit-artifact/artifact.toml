kind = "web"
previewPath = "/"
title = "Charles — Office Mood Check-In"
version = "1.0.0"
id = "artifacts/charles"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21716

[services.development]
run = "pnpm --filter @workspace/charles run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/charles", "run", "build" ]
publicDir = "artifacts/charles/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21716"
BASE_PATH = "/"
